name: Validate

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  merge_group:
    types:
      - checks_requested

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Validate package
        shell: bash
        run: |
          set -euo pipefail
          yarn lint
          yarn typecheck
          yarn test --maxWorkers=2
          yarn prepare
          git diff --exit-code

  build-android:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build Android example
        env:
          JAVA_OPTS: "-XX:MaxHeapSize=6g"
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1024m"
        shell: bash
        run: |
          set -euo pipefail
          yarn codegen
          yarn workspace react-native-turbo-sqlite-example build:android

  build-ios:
    needs: validate
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Install CocoaPods
        shell: bash
        env:
          NO_FLIPPER: 1
        run: |
          set -euo pipefail
          cd example/ios
          pod install

      - name: Build iOS example
        shell: bash
        run: |
          set -euo pipefail
          yarn codegen
          yarn workspace react-native-turbo-sqlite-example build:ios

  build-windows:
    needs: validate
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Generate codegen
        shell: powershell
        run: |
          yarn codegen
          yarn codegen:windows
          yarn workspace react-native-turbo-sqlite-example codegen:windows

      - name: Build Windows example
        shell: powershell
        working-directory: example
        run: |
          npx @react-native-community/cli run-windows --no-deploy --no-launch
